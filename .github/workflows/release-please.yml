# 工作流名称
name: release-please
on:
    push:
        branches:
          - main
# 权限
permissions:
    contents: write
    pull-requests: write
# 工作流程
jobs:
    # 生成更改changelog和版本的临时分支
    changelog-and-release:
        # 运行环境
        runs-on: ubuntu-latest
        outputs:
            release_created: ${{ steps.release.outputs.release_created }}
            version: ${{ steps.release.outputs.version }}
        steps:
            # 使用哪个action
            - uses: googleapis/release-please-action@v4
              # action id 便于其他流访问
              id: release
              with:
                  # token 用于访问 GitHub API
                  token: ${{ secrets.GITHUB_TOKEN }}
                  # 项目类型
                  release-type: node
            - name: Print outputs
              run: |
                  echo "Release created: ${{ steps.release.outputs.release_created }}"
                  echo "Version: ${{ steps.release.outputs.version }}"

    # 构建和发布
    build-and-publish:
        runs-on: ubuntu-latest
        needs: changelog-and-release
        if: ${{ needs.changelog-and-release.outputs.release_created }}
        steps:
              # 以下为npm发布逻辑
            - uses: actions/checkout@v3
              # if语句为真运行actions。
              # 当id为release的action结果为created时(即并入了main分支时)
              # 开启node坏境
            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  registry-url: 'https://registry.npmjs.org'
            - run: npm i husky -D
            - run: npm i
              # 打包
            - run: npm run build
              # 生成覆盖率报告
            - name: create coverage
              run: npx jest --coverage --config jest.config.ci.ts
              # 上传覆盖率报告
            - name: Upload coverage reports to Codecov
              uses: codecov/codecov-action@v3
              env:
                  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
            - name: Configure npm for publish
              run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

            - name: Verify npm auth
              run: |
                npm whoami

            - name: Dry-run publish
              run: |
                if echo "${{ needs.changelog-and-release.outputs.version }}" | grep -q "alpha"; then
                  npm publish --tag alpha --dry-run
                elif echo "${{ needs.changelog-and-release.outputs.version }}" | grep -q "beta"; then
                  npm publish --tag beta --dry-run
                elif echo "${{ needs.changelog-and-release.outputs.version }}" | grep -q "dev"; then
                  npm publish --tag dev --dry-run
                elif echo "${{ needs.changelog-and-release.outputs.version }}" | grep -q "rc"; then
                  npm publish --tag rc --dry-run
                else
                  npm publish --dry-run
                fi
              env:
                NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
            # 发布
            - name: Publish to npm (only when REAL_PUBLISH=true)
              if: env.REAL_PUBLISH == 'true'
              run: |
                if echo "${{ needs.changelog-and-release.outputs.version }}" | grep -q "alpha"; then
                  npm publish --tag alpha
                elif echo "${{ needs.changelog-and-release.outputs.version }}" | grep -q "beta"; then
                  npm publish --tag beta
                elif echo "${{ needs.changelog-and-release.outputs.version }}" | grep -q "dev"; then
                  npm publish --tag dev
                elif echo "${{ needs.changelog-and-release.outputs.version }}" | grep -q "rc"; then
                  npm publish --tag rc
                else
                  npm publish
                fi
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

